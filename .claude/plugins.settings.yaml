# Project-level plugin configuration overrides.
# These settings take precedence over plugin defaults.
# See each plugin's <plugin-name>.settings.yaml for available options.

github:
  # gh is managed by mise (see .mise.toml).
  # The plugin still runs gh auth status to verify authentication.
  autoInstall: false

mise:
  autoInstallTools: true
  autoTrust: true

hookify:
  enabled: true
  watchFiles:
    - "package.json"
  reminderMessage: >-
    Dependencies in package.json changed. Check if the LICENSES array
    in packages/ui/src/components/settings/SettingsModal.tsx needs updating
    to reflect added, removed, or changed dependencies.
  checkFiles:
    - "packages/ui/src/components/settings/SettingsModal.tsx"
