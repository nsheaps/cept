name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip release commits to avoid infinite loops
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/github-app-auth@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality gate
        run: bun run validate

      - name: Configure git
        run: |
          # Set up branch tracking so release-it doesn't fail on upstream check
          git branch --set-upstream-to=origin/main main 2>/dev/null || true

      - name: Determine version bump
        id: version
        run: |
          set +e
          NEXT_VERSION=$(bunx release-it --release-version --ci 2>/dev/null)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ] || [ -z "$NEXT_VERSION" ]; then
            echo "No version bump needed (exit code: $EXIT_CODE)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Next version: $NEXT_VERSION"
            echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Release
        if: steps.version.outputs.skip != 'true'
        run: bun run release:ci -- --verbose
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
