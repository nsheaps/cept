name: Update Screenshots

on:
  workflow_call:
    outputs:
      changed:
        description: "Whether any screenshots had pixel-level changes"
        value: ${{ jobs.screenshots.outputs.changed }}

jobs:
  screenshots:
    name: Capture Screenshots
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        timeout-minutes: 10
        env:
          # FFmpeg is fetched from playwright.download.prss.microsoft.com, which is
          # unreachable from this CI network and hangs the install indefinitely.
          # FFmpeg is only used for video recording (not enabled in
          # playwright.config.ts), so its download is best-effort: a connection
          # timeout plus a hard `timeout` backstop bound the stall, and the step
          # then requires only that Chromium (served from the reachable
          # storage.googleapis.com) actually installed.
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "90000"
        run: |
          set -uo pipefail
          if ! timeout 300 bunx playwright install --with-deps chromium; then
            echo "::warning::playwright install did not complete cleanly (expected: FFmpeg host unreachable); verifying Chromium"
          fi
          if ! find ~/.cache/ms-playwright -path '*chromium-*/chrome-linux*/chrome' -type f | grep -q .; then
            echo "::error::Chromium browser did not install"
            exit 1
          fi
          echo "Chromium installed: $(find ~/.cache/ms-playwright -maxdepth 1 -name 'chromium-*' -type d)"

      - name: Create screenshots directory
        run: mkdir -p docs/screenshots/features

      - name: Capture screenshots
        run: bunx playwright test tests/feature-screenshots.spec.ts
        working-directory: e2e
        env:
          CI: true

      - name: Compare screenshots pixel-by-pixel
        id: compare
        run: |
          # Install ImageMagick for pixel-level comparison
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick > /dev/null 2>&1

          CHANGED=false
          for new_file in docs/screenshots/features/*.png; do
            [ -f "$new_file" ] || continue

            # If file is new (not tracked), it's a real change
            if ! git show HEAD:"$new_file" > /tmp/old_screenshot.png 2>/dev/null; then
              echo "NEW: $new_file"
              CHANGED=true
              continue
            fi

            # Compare pixels only (AE = Absolute Error pixel count)
            DIFF=$(compare -metric AE "$new_file" /tmp/old_screenshot.png /dev/null 2>&1 || true)

            if [ "$DIFF" = "0" ]; then
              # Pixels identical — restore original to avoid metadata-only diff
              echo "UNCHANGED (metadata only): $new_file"
              git checkout HEAD -- "$new_file"
            else
              echo "CHANGED ($DIFF pixels differ): $new_file"
              CHANGED=true
            fi
          done

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Upload changed screenshots
        if: steps.compare.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-screenshots
          path: docs/screenshots/
          retention-days: 5

      - name: Upload screenshots for review
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: feature-screenshots
          path: docs/screenshots/
          retention-days: 30
