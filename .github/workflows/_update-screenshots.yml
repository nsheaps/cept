name: Update Screenshots

on:
  workflow_call:
    outputs:
      changed:
        description: "Whether any screenshots had pixel-level changes"
        value: ${{ jobs.screenshots.outputs.changed }}

jobs:
  screenshots:
    name: Capture Screenshots
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-v1.59.1-noble

      - name: Provision Playwright browsers from official image
        if: steps.pw-cache.outputs.cache-hit != 'true'
        # Playwright's browser CDN (storage.googleapis.com /
        # playwright.download.prss.microsoft.com) stalls intermittently from this CI,
        # hanging `playwright install` for the full job timeout. Instead, copy the
        # browsers out of Playwright's official image (version-matched to
        # @playwright/test 1.59.1), which avoids the CDN entirely.
        run: |
          set -euo pipefail
          img=mcr.microsoft.com/playwright:v1.59.1-noble
          docker pull "$img"
          cid=$(docker create "$img")
          mkdir -p ~/.cache/ms-playwright
          docker cp "$cid:/ms-playwright/." ~/.cache/ms-playwright/
          docker rm "$cid" >/dev/null
          ls -1 ~/.cache/ms-playwright

      - name: Install Playwright system dependencies
        # apt-only (no browser download); installs the few libs the runner lacks.
        run: bunx playwright install-deps chromium

      - name: Create screenshots directory
        run: mkdir -p docs/screenshots/features

      - name: Capture screenshots
        run: bunx playwright test tests/feature-screenshots.spec.ts
        working-directory: e2e
        env:
          CI: true

      - name: Compare screenshots pixel-by-pixel
        id: compare
        run: |
          # Install ImageMagick for pixel-level comparison
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick > /dev/null 2>&1

          CHANGED=false
          for new_file in docs/screenshots/features/*.png; do
            [ -f "$new_file" ] || continue

            # If file is new (not tracked), it's a real change
            if ! git show HEAD:"$new_file" > /tmp/old_screenshot.png 2>/dev/null; then
              echo "NEW: $new_file"
              CHANGED=true
              continue
            fi

            # Compare pixels only (AE = Absolute Error pixel count)
            DIFF=$(compare -metric AE "$new_file" /tmp/old_screenshot.png /dev/null 2>&1 || true)

            if [ "$DIFF" = "0" ]; then
              # Pixels identical — restore original to avoid metadata-only diff
              echo "UNCHANGED (metadata only): $new_file"
              git checkout HEAD -- "$new_file"
            else
              echo "CHANGED ($DIFF pixels differ): $new_file"
              CHANGED=true
            fi
          done

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Upload changed screenshots
        if: steps.compare.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-screenshots
          path: docs/screenshots/
          retention-days: 5

      - name: Upload screenshots for review
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: feature-screenshots
          path: docs/screenshots/
          retention-days: 30
