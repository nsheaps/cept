name: Update Screenshots

on:
  workflow_call:
    outputs:
      changed:
        description: "Whether any screenshots had pixel-level changes"
        value: ${{ jobs.screenshots.outputs.changed }}

jobs:
  screenshots:
    name: Capture Screenshots
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        timeout-minutes: 15
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "60000"
        run: |
          set -uo pipefail
          # Authoritative check: Playwright writes INSTALLATION_COMPLETE only after a
          # browser is fully downloaded AND extracted.
          chromium_installed() {
            find ~/.cache/ms-playwright -maxdepth 2 -path '*/chromium-*/INSTALLATION_COMPLETE' -type f 2>/dev/null | grep -q .
          }
          # Playwright's CDN downloads intermittently stall in this CI, and FFmpeg's
          # host (playwright.download.prss.microsoft.com) is frequently unreachable.
          # `playwright install` is idempotent (skips already-installed browsers), so
          # retry with a per-attempt `timeout` that kills a stalled download; each
          # retry accumulates progress. Stop as soon as Chromium is installed —
          # FFmpeg is only used for video recording (not enabled in
          # playwright.config.ts), so it is best-effort.
          for attempt in 1 2 3 4 5 6; do
            if timeout 150 bunx playwright install --with-deps chromium; then
              break
            fi
            if chromium_installed; then
              echo "::warning::Chromium installed; FFmpeg unavailable (not needed for these tests)"
              break
            fi
            echo "::warning::install attempt ${attempt} incomplete (download stalled); retrying"
          done
          if ! chromium_installed; then
            echo "::error::Chromium browser failed to install after retries"
            exit 1
          fi
          echo "Chromium installed: $(find ~/.cache/ms-playwright -maxdepth 1 -name 'chromium-*' -type d)"

      - name: Create screenshots directory
        run: mkdir -p docs/screenshots/features

      - name: Capture screenshots
        run: bunx playwright test tests/feature-screenshots.spec.ts
        working-directory: e2e
        env:
          CI: true

      - name: Compare screenshots pixel-by-pixel
        id: compare
        run: |
          # Install ImageMagick for pixel-level comparison
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick > /dev/null 2>&1

          CHANGED=false
          for new_file in docs/screenshots/features/*.png; do
            [ -f "$new_file" ] || continue

            # If file is new (not tracked), it's a real change
            if ! git show HEAD:"$new_file" > /tmp/old_screenshot.png 2>/dev/null; then
              echo "NEW: $new_file"
              CHANGED=true
              continue
            fi

            # Compare pixels only (AE = Absolute Error pixel count)
            DIFF=$(compare -metric AE "$new_file" /tmp/old_screenshot.png /dev/null 2>&1 || true)

            if [ "$DIFF" = "0" ]; then
              # Pixels identical — restore original to avoid metadata-only diff
              echo "UNCHANGED (metadata only): $new_file"
              git checkout HEAD -- "$new_file"
            else
              echo "CHANGED ($DIFF pixels differ): $new_file"
              CHANGED=true
            fi
          done

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Upload changed screenshots
        if: steps.compare.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-screenshots
          path: docs/screenshots/
          retention-days: 5

      - name: Upload screenshots for review
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: feature-screenshots
          path: docs/screenshots/
          retention-days: 30
