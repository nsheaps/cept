name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: |
          cd packages/web
          npx vite build
        env:
          VITE_BASE_PATH: /cept/pr-${{ github.event.pull_request.number }}/
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Deploy to GitHub Pages subdirectory
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          DEPLOY_DIR="pr-${PR_NUMBER}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch gh-pages branch or create it
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          # Clean the PR directory and copy new build
          rm -rf "${DEPLOY_DIR}"
          mkdir -p "${DEPLOY_DIR}"
          cp -r packages/web/dist/* "${DEPLOY_DIR}/"

          # Ensure the site-level 404.html exists at the root
          if [ ! -f 404.html ]; then
            cat > 404.html << 'SITE_404'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8" />
              <title>Cept</title>
              <script>
                (function () {
                  var path = window.location.pathname;
                  var prMatch = path.match(/^\/cept\/pr-(\d+)(\/.*)?$/);
                  if (prMatch) {
                    var prBase = '/cept/pr-' + prMatch[1] + '/';
                    var prRoute = prMatch[2] || '/';
                    if (prRoute === '/') return;
                    window.location.replace(prBase + '?route=' + encodeURIComponent(prRoute + window.location.search + window.location.hash));
                    return;
                  }
                  var appMatch = path.match(/^\/cept\/app(\/.*)?$/);
                  if (appMatch) {
                    var appRoute = appMatch[1] || '/';
                    if (appRoute === '/') return;
                    window.location.replace('/cept/app/?route=' + encodeURIComponent(appRoute + window.location.search + window.location.hash));
                    return;
                  }
                  // Any other /cept/... path — redirect to app with route preserved
                  if (path.indexOf('/cept') === 0) {
                    var remaining = path.slice('/cept'.length) || '/';
                    if (remaining === '/') {
                      window.location.replace('/cept/app/');
                    } else {
                      window.location.replace('/cept/app/?route=' + encodeURIComponent(remaining + window.location.search + window.location.hash));
                    }
                    return;
                  }
                })();
              </script>
            </head>
            <body>
              <p>Page not found. <a href="/cept/app/">Go to Cept</a></p>
            </body>
          </html>
          SITE_404
            git add 404.html
          fi

          # Commit and push
          git add "${DEPLOY_DIR}"
          git commit -m "Deploy preview for PR #${PR_NUMBER}" --allow-empty
          git push origin gh-pages

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://nsheaps.github.io/cept/pr-${prNumber}/`;
            const body = `## Preview Deployment\n\nThe web app for this PR has been deployed:\n\n**[Open Preview](${previewUrl})**\n\nUse this to verify the app works correctly, especially for dependency updates.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes('Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          DEPLOY_DIR="pr-${PR_NUMBER}"

          if [ -d "${DEPLOY_DIR}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            rm -rf "${DEPLOY_DIR}"
            git add -A
            git commit -m "Clean up preview for PR #${PR_NUMBER}" --allow-empty
            git push origin gh-pages
          fi
