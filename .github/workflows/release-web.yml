name: Release Web

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-web
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/github-app-auth@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /cept/app/
          COMMIT_SHA: ${{ github.sha }}

      - name: Deploy to GitHub Pages (app/ subdirectory)
        run: |
          # Fetch gh-pages branch or create it
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          # Clean the app directory and copy new build
          rm -rf app
          mkdir -p app
          cp -r packages/web/dist/* app/

          # Copy shared site-level pages (404 router + root redirect)
          git show origin/main:.github/pages/404.html > 404.html
          git show origin/main:.github/pages/index.html > index.html

          # Commit and push
          git add app/ 404.html index.html
          git commit -m "Deploy production app ($(git describe --tags --always))" --allow-empty
          git push origin gh-pages
